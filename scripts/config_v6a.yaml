# =============================
# Simulation Configuration File (v6a)
# =============================

output:
  root_dir: "output/airmspi_sim_6_002"
  save_png: false
  save_nc: true
  plot_mode: "overwrite"   # "skip" | "if_missing" | "overwrite"
  png_dpi: 300

sensor:
  type: "perspective_projection"
  altitude_km: 20.0
  fov_deg: 30
  resolution_km: 0.010
  views:
    names: ["nadir"]
    zenith_deg: [0]      # 先调这个：控制VZA整体大小（越大，边缘VZA越大）
    azimuth_deg: [153]     # 先调这个：控制视线主方向（会影响VAA/RAA的整体朝向）

  trajectory:
    mode: "cross_track"                 # "adjacent_views"(相邻视角推断) | "sensor_azimuth"(按每个视角方位角) | "cross_track"(横向扫描)
    fallback_heading_deg: 0.0     # 单视角或几何退化时的默认飞行方向角(度)
    manual_flight_azimuth_deg: 0.0  # 兼容旧字段（trajectory.mode=sensor_azimuth时不再作为主开关）
    aircraft_heading_deg: 90.16     # 飞机航向角(正北=0, 顺时针)
    aircraft_pitch_deg: 0.53        # 飞机俯仰角
    aircraft_roll_deg: -0.26         # 飞机滚转角
    camera_pitch_relative_deg: 0.0 # 相机相对飞机俯仰
    camera_roll_relative_deg: 0.0  # 相机相对飞机绕LOS滚转
    camera_relative_roll_deg: 0.6   # 相机相对飞机的滚转角(度)，默认0表示相机x/y轴与飞机参考方向对齐
    camera_align_with_flight_heading: false  # false: 相机坐标与世界上方向对齐(默认，分界线更稳定竖直/水平)
    apply_flight_azimuth_offset_to_vaa: true  # 开启：VAA/RAA按飞机航向角做偏置（当前参数飞机沿+Y飞行）
    camera_image_transpose: false   # 是否对模拟图像做转置（仅用于对齐历史AirMSPI观测像元方向）
    camera_image_flip_lr: false     # 是否做左右翻转（仅用于复现实测图像方向）
    # --- SHDOM-style cross track mode parameters ---
    # mode="cross_track" 时启用以下参数；单位为 km，角度为 deg。
    cross_track_nbytes: 2            # 兼容SHDOM参数，当前用于元数据记录 number of bytes per pixel in PGM output images
    cross_track_scale: 1.0           # 兼容SHDOM参数，当前用于元数据记录 the scaling from radiance to pixel value in image
    cross_track_spacing: 0.010        # along track distance between scans (along-track 相邻扫描位置间距)
    cross_track_scan1_deg: -15.0     # 左侧最小cross-track扫描角
    cross_track_scan2_deg: 15.0      # 右侧最大cross-track扫描角
    cross_track_delscan_deg: 0.02     # the angle [degl between pixels in the scan 像元间扫描角步长
    cross_track_selected_view_indices: [1]  # 可选：1-based视角序号，如[1,3,4,5,6,8,9]
    cross_track_case_id: "Case_21_2019_0806_1839"   # 缓存几何参数用
    cross_track_cache_file: "output/cross_track_cache.json"  # 结果缓存文件

# camera pixel grid for perspective_projection
camera:
  x_resolution: 2000
  y_resolution: 2000

# scene source and camera look-at point (km)
scene:
  # AT3D/SHDOM world coordinates: [x, y, z] = [North, East, Up] (NEU, left-handed).
  input_path: "../data/synthetic_cloud_fields/jpl_les/retrieval_2019_0806_1839_extended.csv"
  lookat_center_km: [4.5, 3.8, 0.0]  # 关键参数：平移VZA“最低点”在图上的位置（不必在区域几何中心）
  # surface toggles
  enable_brdf: false
  enable_bpdf: false
  brdf_model: "diner"         # currently supported: diner; fallback to lambertian when disabled/unsupported
  lambertian_albedo: 0.0
  # fallback values used when CSV lacks corresponding surface fields
  brdf_default_a: 0.0
  brdf_default_k: 1.0
  brdf_default_b: 0.0
  bpdf_default_e: 0.0
  bpdf_default_wind_vv: 5.0
  bpdf_default_wind_wd: 0.0

# solar geometry in geophysical convention
solar:
  sza_deg: 35.5    # 主要影响散射角绝对值范围（与VZA共同决定）
  saa_deg: -35.0   # 主要影响RAA和散射角的方向梯度

# radiative transfer solver parameters
solver:
  x_boundary_condition: "open"
  y_boundary_condition: "open"
  num_mu_bins: 12
  num_phi_bins: 12
  split_accuracy: 0.1
  deltam: true
  # optional memory/adaptive-grid controls (for MAXNBC / memory pressure)
  adapt_grid_factor: null
  cell_to_point_ratio: null
  max_total_mb: null

# aerosol optical setup
# complex refractive index = n - i*k
aerosol:
  refractive_index_real: 1.4
  refractive_index_imag: 0.001
  particle_density: 1.6
  # microphysics sanitize/clipping controls (used before OpticalPropertyGenerator)
  reff_default: 0.2
  veff_default: 0.10
  reff_clip_min: 0.05
  reff_clip_max: 30.0
  veff_clip_min: 0.01
  veff_clip_max: 1.0
  density_floor: 0.0
  mode_selection: "both"   # both | mode1 | mode2

bands:
  wavelength_nm: [470]
  is_polarized: [true]

downsample:
  factor: 12
  method: "mean"

save_versions:
  - "original"
  - "registered"
  - "downsampled"
  - "downsampled_registered"

plot:
  enable_3d_geometry: true
  enable_ground_image: true
  colormap: "viridis"
  replot_layout: "panel"   # "panel": IQU一张+角度一张；"separate": 每个变量单独绘图

ground_grid:
  x_min: 0.0
  x_max: 10.0
  nx: 600
  y_min: 0.0
  y_max: 7.0
  ny: 240

compute:
  n_jobs: 8

ground_crop:
  x_range: [0.0, 10.0]
  y_range: [0.0, 7.0]
