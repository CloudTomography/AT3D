{% set name = "at3d" %}
{% set version = "4.1.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
  host:
    - python >=3.10
    - pip
    - meson-python >=0.16.0
    - meson >=1.2.0
    - ninja
    - numpy >=2.0.0
  run:
    - python >=3.10
    - numpy >=1.25
    - scipy >=1.10
    - matplotlib-base >=3.7
    - dill >=0.3.1
    - joblib >=1.2
    - tensorboardx >=2.0
    - pillow >=9.0
    - numdifftools >=0.9.39
    - pandas >=1.5
    - xarray >=2023.1
    - netcdf4 >=1.6
    - bottleneck >=1.3.5

test:
  imports:
    - at3d
    - at3d.core
  requires:
    - nose2 >=0.12
  commands:
    - cd tests && nose2 -v
  source_files:
    - tests/

about:
  home: https://github.com/CloudTomography/AT3D
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 3D Radiative Transfer Inversion using the SHDOM forward algorithm
  description: |
    AT3D performs 3D reconstruction of cloud/aerosol microphysical properties
    from multi-angle, multi-spectral solar reflected radiation using a non-linear
    optimization procedure. The core radiative transfer routines are sourced from
    the Fortran SHDOM (Spherical Harmonic Discrete Ordinate Method for 3D
    Atmospheric Radiative Transfer) code by Frank K. Evans.
